{% set python_min = "3.11" %}
{% set name = "pyramids" %}
{% set version = "0.15.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/serapeum-org/pyramids/archive/{{ version }}.tar.gz
  sha256: 56c107e82d11c208a87f610bd8ef97014d6820d621e321b70a715197f94aaa9a

build:
  number: 0
  noarch: python
  script: python -m pip install . -vv

requirements:
  host:
    - python {{ python_min }}
    - pip >=24.3.1
    - setuptools
  run:
    - python >={{ python_min }}
    - geopandas >=1.0.0
    - hpc >=0.1.5
    - numpy >=2.0.0
    - pandas >=2.0.0
    - pyproj >=3.7.0
    - PyYAML >=6.0.0
    - Shapely >=2.0.0
    - scipy >=1.10.0
    - gdal >=3.10.0
    - libgdal-netcdf >=3.10.0
    - libgdal-hdf4 >=3.10.0

  run_constrained:
    # viz
    - cleopatra >=0.7.1
    - mercantile >=1.2.0
    - xyzservices >=2024.4.0
    - Pillow >=9.0.0
    # xarray
    - xarray >=2023.1.0
    # lazy
    - dask >=2024.1.0
    - distributed >=2024.1.0
    - zarr >=2.17.0,<3
    - fsspec >=2024.1.0
    # netcdf-lazy
    - kerchunk >=0.2.6
    - h5py >=3.8.0
    # parquet
    - pyarrow >=10.0.0
    # parquet-lazy
    - dask-geopandas >=0.5.0

test:
  requires:
    - python {{ python_min }}
  imports:
    - pyramids

outputs:
  - name: {{ name }}

  - name: {{ name }}-viz
    build:
      noarch: python
    requirements:
      run:
        - {{ pin_subpackage(name, exact=True) }}
        - cleopatra >=0.7.1
        - mercantile >=1.2.0
        - xyzservices >=2024.4.0
        - Pillow >=9.0.0
    test:
      imports:
        - pyramids

  - name: {{ name }}-xarray
    build:
      noarch: python
    requirements:
      run:
        - {{ pin_subpackage(name, exact=True) }}
        - xarray >=2023.1.0
    test:
      imports:
        - pyramids

  - name: {{ name }}-lazy
    build:
      noarch: python
    requirements:
      run:
        - {{ pin_subpackage(name, exact=True) }}
        - dask >=2024.1.0
        - distributed >=2024.1.0
        - zarr >=2.17.0,<3
        - fsspec >=2024.1.0
    test:
      imports:
        - pyramids

  - name: {{ name }}-netcdf-lazy
    build:
      noarch: python
    requirements:
      run:
        - {{ pin_subpackage(name ~ '-lazy', exact=True) }}
        - kerchunk >=0.2.6
        - h5py >=3.8.0
    test:
      imports:
        - pyramids

  - name: {{ name }}-parquet
    build:
      noarch: python
    requirements:
      run:
        - {{ pin_subpackage(name, exact=True) }}
        - pyarrow >=10.0.0
    test:
      imports:
        - pyramids

  - name: {{ name }}-parquet-lazy
    build:
      noarch: python
    requirements:
      run:
        - {{ pin_subpackage(name ~ '-lazy', exact=True) }}
        - {{ pin_subpackage(name ~ '-parquet', exact=True) }}
        - dask-geopandas >=0.5.0
    test:
      imports:
        - pyramids

about:
  home: https://github.com/serapeum-org/pyramids
  license: GPL-3.0-only
  license_family: GPL
  license_file: LICENSE.md
  summary: GIS utility package
  description: |
    GIS utility package.
  dev_url: https://github.com/serapeum-org/pyramids
  doc_url: https://serapeum-org.github.io/pyramids
  doc_source_url: https://github.com/serapeum-org/pyramids/main/README.md

extra:
  recipe-maintainers:
    - MAfarrag
