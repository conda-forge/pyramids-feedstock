{% set python_min = "3.11" %}
{% set name = "pyramids" %}
{% set version = "0.41.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/serapeum-org/pyramids/archive/{{ version }}.tar.gz
  sha256: 19845a9ea7d98c60abd957849aff875adc0e2e7b29ca6de586d28ad0079b9aa9

build:
  number: 0
  noarch: python
  script: python -m pip install . -vv

requirements:
  host:
    - python {{ python_min }}
    - pip >=24.3.1
    - setuptools >=80.0.0
    - wheel
  run:
    - python >={{ python_min }}
    - cftime >=1.6.4
    - geopandas >=1.0.0
    - hpc >=0.1.5
    - numpy >=2.0.0
    - pandas >=2.0.0
    - pyproj >=3.7.0
    - PyYAML >=6.0.0
    - Shapely >=2.1.0
    - scipy >=1.10.0
    - gdal >=3.10.0,<4
    - libgdal-netcdf >=3.10.0,<4
    - libgdal-hdf4 >=3.10.0,<4
    # libgdal-grib provides the GRIB driver pyramids.grib.open_grib needs.
    - libgdal-grib >=3.10.0,<4
    # conda-forge's geopandas-base no longer pulls a vector-IO backend;
    # pyogrio is required for GeoDataFrame.to_file / read_file on every env.
    - pyogrio >=0.7

  run_constrained:
    # viz — `cleopatra-tiles` is the conda-forge equivalent of the PyPI
    # `cleopatra[tiles]` extra (pulls cleopatra + mercantile + xyzservices + Pillow).
    - cleopatra-tiles >=0.21.0
    # xarray — peer interop dep (no longer a dedicated extra in pyproject 0.33.0)
    - xarray >=2023.1.0
    # lazy — now also bundles kerchunk + h5py for the NetCDF/HDF5 lazy path.
    # h5py 3.16 moved to hdf5 2.x but libgdal-netcdf still links hdf5 1.14.x;
    # pin both so the env always shares one hdf5 binary.
    - dask-core >=2024.1.0
    - distributed >=2024.1.0
    - zarr >=3
    - fsspec >=2024.1.0
    - s3fs >=2024.1.0
    - flox >=0.9.0
    - kerchunk >=0.2.10
    - h5py >=3.8.0,<3.16
    - hdf5 1.14.*
    # parquet — now also bundles dask-geopandas (the former parquet-lazy extra).
    - pyarrow >=10.0.0
    - dask-geopandas >=0.5.0
    # stac — conda-forge equivalent of the PyPI `stac` extra. The PyPI extra also
    # pins stac-asset>=0.4.7, which is not yet packaged on conda-forge; add it here
    # once it lands on the channel.
    - pystac-client >=0.8.0

test:
  requires:
    - python {{ python_min }}
  imports:
    - pyramids
  commands:
    # verify the `pyramids` console entry point (pyramids.cli:main) is installed and runnable
    - pyramids --help

outputs:
  - name: {{ name }}

  - name: {{ name }}-viz
    build:
      noarch: python
    requirements:
      run:
        - {{ pin_subpackage(name, exact=True) }}
        # conda-forge equivalent of the PyPI `cleopatra[tiles]` extra
        # (cleopatra + mercantile + xyzservices + Pillow).
        - cleopatra-tiles >=0.21.0
    test:
      imports:
        - pyramids

  - name: {{ name }}-lazy
    build:
      noarch: python
    requirements:
      run:
        - {{ pin_subpackage(name, exact=True) }}
        - dask-core >=2024.1.0
        - distributed >=2024.1.0
        - zarr >=3
        - fsspec >=2024.1.0
        - s3fs >=2024.1.0
        - flox >=0.9.0
        # kerchunk + h5py for the NetCDF/HDF5 lazy (Zarr-reference) path.
        # h5py 3.16 dragged hdf5 2.x; libgdal-netcdf still links hdf5 1.14.x.
        # Pin both to keep one hdf5 binary in the env (Windows DLL-shadow risk).
        - kerchunk >=0.2.10
        - h5py >=3.8.0,<3.16
        - hdf5 1.14.*
    test:
      imports:
        - pyramids

  - name: {{ name }}-parquet
    build:
      noarch: python
    requirements:
      run:
        - {{ pin_subpackage(name ~ '-lazy', exact=True) }}
        - pyarrow >=10.0.0
        - dask-geopandas >=0.5.0
    test:
      imports:
        - pyramids

  - name: {{ name }}-stac
    build:
      noarch: python
    requirements:
      run:
        - {{ pin_subpackage(name, exact=True) }}
        # conda-forge equivalent of the PyPI `stac` extra. stac-asset>=0.4.7 (also
        # part of the PyPI extra) is not yet on conda-forge; add it once available.
        - pystac-client >=0.8.0
    test:
      imports:
        - pyramids

about:
  home: https://github.com/serapeum-org/pyramids
  license: GPL-3.0-only
  license_family: GPL
  license_file: LICENSE.md
  summary: GIS utility package
  description: |
    GIS utility package.
  dev_url: https://github.com/serapeum-org/pyramids
  doc_url: https://serapeum-org.github.io/pyramids
  doc_source_url: https://github.com/serapeum-org/pyramids/main/README.md

extra:
  recipe-maintainers:
    - MAfarrag
